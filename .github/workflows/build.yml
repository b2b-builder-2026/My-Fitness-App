name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install flet
      - name: Build APK
        run: |
          pip install flet[all]
          flet pack main.py --as-apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-fitness-app-apk
          path: dist/*.apk
